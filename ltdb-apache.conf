# LTDB Flask app via gunicorn reverse proxy
# Place in /etc/apache2/conf-available/ltdb.conf
# then:
#   sudo a2enmod proxy proxy_http headers
#   sudo a2enconf ltdb
#   sudo systemctl reload apache2

# Serve static files directly — no need to go through gunicorn
Alias /ltdb/static /var/www/ltdb/web/static
<Directory /var/www/ltdb/web/static>
    Require all granted
</Directory>

<Location /ltdb>
    ProxyPass unix:/run/ltdb/ltdb.sock|http://localhost/
    ProxyPassReverse unix:/run/ltdb/ltdb.sock|http://localhost/
    # Tell Flask it is mounted at /ltdb
    RequestHeader set X-Forwarded-Prefix "/ltdb"
</Location>
